<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Trắc Nghiệm Công Nghệ - Full Grade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0ea5e9; --bg: #0f172a; }
        body { background: var(--bg); color: #f1f5f9; font-family: 'Inter', sans-serif; min-height: 100vh; margin: 0; }
        .font-tech { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-tech { transition: all 0.3s; border: 1px solid rgba(14, 165, 233, 0.3); cursor: pointer; }
        .btn-tech:hover:not(:disabled) { background: var(--primary); color: white; box-shadow: 0 0 20px var(--primary); }
        .hidden { display: none; }
        .selected-opt { background: rgba(14, 165, 233, 0.3) !important; border-color: #0ea5e9 !important; }
        .opt-correct { background: #059669 !important; border-color: #10b981 !important; color: white; }
        .opt-wrong { background: #dc2626 !important; border-color: #ef4444 !important; color: white; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto flex justify-between items-center mb-8">
        <div>
            <h1 class="font-tech text-2xl text-sky-400">TECH_EXAM v1.3</h1>
            <p id="grade-display" class="text-xs text-slate-500 uppercase tracking-widest">Hệ thống trắc nghiệm trực tuyến</p>
        </div>
        <div id="timer-box" class="glass px-6 py-2 rounded-full border-sky-500/50 hidden">
            <span id="timer" class="font-tech text-xl text-sky-400">15:00</span>
        </div>
    </div>

    <div class="max-w-4xl mx-auto">
        <!-- MÀN HÌNH 1: CHỌN KHỐI -->
        <div id="screen-1" class="text-center py-12">
            <h2 class="text-3xl font-bold mb-10">Chọn Khối Lớp</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <button onclick="selectGrade(10)" class="btn-tech glass p-8 rounded-2xl text-xl font-bold">CÔNG NGHỆ 10</button>
                <button onclick="selectGrade(11)" class="btn-tech glass p-8 rounded-2xl text-xl font-bold">CÔNG NGHỆ 11</button>
                <button disabled class="btn-tech glass p-8 rounded-2xl text-xl font-bold opacity-30 cursor-not-allowed">CÔNG NGHỆ 12</button>
            </div>
        </div>

        <!-- MÀN HÌNH 2: CHỌN HÌNH THỨC -->
        <div id="screen-2" class="hidden text-center py-12">
            <h2 id="screen-2-title" class="text-3xl font-bold mb-10">Chọn Hình Thức Thi</h2>
            <div class="flex flex-col md:flex-row justify-center gap-6">
                <button onclick="selectType('multiple')" class="btn-tech glass p-8 rounded-2xl text-xl font-bold w-full md:w-80">Trắc Nghiệm (30 câu)</button>
            </div>
            <button onclick="goBack(1)" class="mt-8 text-slate-500 hover:text-white block mx-auto">← Quay lại</button>
        </div>

        <!-- MÀN HÌNH 3: LÀM BÀI -->
        <div id="screen-3" class="hidden">
            <div id="quiz-container" class="space-y-8 mb-32"></div>
            <div class="fixed bottom-0 left-0 w-full glass p-4 flex justify-center border-t border-sky-500/30 z-50">
                <button id="submit-btn" onclick="confirmSubmit()" class="bg-sky-600 hover:bg-sky-500 text-white px-12 py-3 rounded-xl font-bold uppercase tracking-widest transition-all">Nộp Bài</button>
            </div>
        </div>

        <!-- MÀN HÌNH 4: KẾT QUẢ -->
        <div id="screen-4" class="hidden text-center py-12 space-y-6">
            <h2 class="font-tech text-4xl text-sky-400">KẾT QUẢ</h2>
            <div class="glass p-10 rounded-3xl inline-block min-w-[300px]">
                <p id="score-text" class="text-6xl font-bold">0/30</p>
            </div>
            <div class="flex flex-col items-center gap-4 pt-8">
                <button onclick="showReview()" class="bg-emerald-600 hover:bg-emerald-500 px-10 py-3 rounded-full uppercase text-sm font-bold">Xem lại đáp án</button>
                <button onclick="location.reload()" class="text-slate-400 hover:text-white uppercase text-xs">Về trang chủ</button>
            </div>
        </div>
    </div>

                    { question: "Nhiệm vụ nối ngắt dòng truyền mômen từ động cơ đến hộp số là của?", options: ["Hộp số", "Các đăng", "Vi sai", "Li hợp"], answer: 3 },
                    { question: "Phân loại động cơ theo nhiên liệu:", options: ["Làm mát nước/gió", "2 kì / 4 kì", "Xăng, Diesel, Gas", "1 xi lanh / nhiều xi lanh"], answer: 2 },
                    { question: "Nếu hệ thống treo bị hỏng, xe di chuyển sẽ:", options: ["Rung lắc mạnh khó kiểm soát", "Đi nhanh hơn", "Ngắt điện", "Tiết kiệm nhiên liệu"], answer: 0 },
                    { question: "Nếu bầu lọc dầu bị tắc hoàn toàn, dầu sẽ đi đâu?", options: ["Chảy ngược lại các-te", "Đi qua két làm mát", "Mở van an toàn đi thẳng vào đường dầu chính", "Ngắt dòng truyền động"], answer: 2 },
                    { question: "Nhận định chính xác về xử lí khí NOx:", options: ["Xăng và Diesel xử lí giống hệt nhau", "Diesel dùng bộ xúc tác tam nguyên", "Xăng dùng bộ xúc tác khử, Diesel dùng EGR", "Diesel oxy hóa NOx thành CO2"], answer: 2 },
                    { question: "Nhiệm vụ của hệ thống bôi trơn là gì?", options: ["Cung cấp hòa khí", "Đưa dầu đến các bề mặt giảm ma sát", "Quay trục khuỷu", "Đốt cháy nhiên liệu"], answer: 1 },
                    { question: "Hệ thống làm mát có nhiệm vụ chính là:", options: ["Giảm tiếng ồn", "Cung cấp dầu", "Giữ nhiệt độ chi tiết trong giới hạn", "Lọc bụi không khí"], answer: 2 },
                    { question: "Hệ thống làm quay trục khuỷu để khởi động máy là:", options: ["Hệ thống đánh lửa.", "Hệ thống khởi động.", "Hệ thống nhiên liệu.", "Hệ thống bôi trơn."], answer: 1 }
                ]
            }
        };

        function selectGrade(g) {
            quizState.grade = g;
            document.getElementById('grade-display').innerText = `Công Nghệ ${g}`;
            document.getElementById('screen-2-title').innerText = `Công Nghệ ${g} - Chọn Hình Thức`;
            goScreen(2);
        }

        function selectType(t) {
            quizState.type = t;
            quizState.userAnswers = {};
            quizState.isReview = false;
            quizState.timeLeft = 900;
            document.getElementById('timer-box').classList.remove('hidden');
            goScreen(3);
            startTimer();
            renderQuiz();
        }

        function goScreen(id) {
            document.querySelectorAll('[id^="screen-"]').forEach(s => s.classList.add('hidden'));
            document.getElementById(`screen-${id}`).classList.remove('hidden');
        }

        function goBack(id) {
            clearInterval(quizState.timerInterval);
            document.getElementById('timer-box').classList.add('hidden');
            goScreen(id);
        }

        function startTimer() {
            clearInterval(quizState.timerInterval);
            quizState.timerInterval = setInterval(() => {
                quizState.timeLeft--;
                let m = Math.floor(quizState.timeLeft / 60);
                let s = quizState.timeLeft % 60;
                document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
                if(quizState.timeLeft <= 0) submitExam();
            }, 1000);
        }

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            const data = questionsDB[quizState.grade][quizState.type];
            container.innerHTML = '';
            
            data.forEach((q, idx) => {
                const qDiv = document.createElement('div');
                qDiv.className = "glass p-6 rounded-2xl space-y-4";
                qDiv.innerHTML = `
                    <p class="font-bold text-sky-400">Câu ${idx+1}</p>
                    <p class="text-lg">${q.question}</p>
                    <div class="grid grid-cols-1 gap-3">
                        ${q.options.map((opt, i) => {
                            let cls = "border-white/10 hover:bg-white/5";
                            let icon = "";
                            if(quizState.isReview) {
                                if(i === q.answer) { cls = "opt-correct"; icon = " ✓"; }
                                else if(quizState.userAnswers[idx] === i) { cls = "opt-wrong"; icon = " ✗"; }
                            } else if(quizState.userAnswers[idx] === i) {
                                cls = "selected-opt";
                            }
                            return `<button ${quizState.isReview ? 'disabled' : ''} onclick="pick(${idx}, ${i}, this)" class="option-btn text-left p-4 rounded-xl border transition-all ${cls}">
                                <span class="font-bold mr-2">${String.fromCharCode(65 + i)}.</span> ${opt} ${icon}
                            </button>`;
                        }).join('')}
                    </div>
                `;
                container.appendChild(qDiv);
            });
        }

        function pick(qIdx, optIdx, btn) {
            quizState.userAnswers[qIdx] = optIdx;
            btn.closest('.grid').querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected-opt'));
            btn.classList.add('selected-opt');
        }

        function confirmSubmit() { if(confirm("Bạn có chắc muốn nộp bài?")) submitExam(); }

        function submitExam() {
            clearInterval(quizState.timerInterval);
            let score = 0;
            const data = questionsDB[quizState.grade][quizState.type];
            data.forEach((q, i) => { if(quizState.userAnswers[i] === q.answer) score++; });
            document.getElementById('score-text').innerText = `${score}/${data.length}`;
            goScreen(4);
            window.scrollTo(0,0);
        }

        function showReview() {
            quizState.isReview = true;
            goScreen(3);
            document.getElementById('submit-btn').innerText = "Về kết quả";
            document.getElementById('submit-btn').onclick = () => goScreen(4);
            renderQuiz();
        }
    </script>
</body>
</html>
