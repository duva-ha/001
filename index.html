<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECH_EXAM v1.4 - Randomized Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0ea5e9; --bg: #0f172a; }
        body { background: var(--bg); color: #f1f5f9; font-family: 'Inter', sans-serif; min-height: 100vh; margin: 0; }
        .font-tech { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-tech { transition: all 0.3s; border: 1px solid rgba(14, 165, 233, 0.3); cursor: pointer; }
        .btn-tech:hover:not(:disabled) { background: var(--primary); color: white; box-shadow: 0 0 20px var(--primary); }
        .hidden { display: none; }
        .selected-opt { background: rgba(14, 165, 233, 0.3) !important; border-color: #0ea5e9 !important; }
        .opt-correct { background: #059669 !important; border-color: #10b981 !important; color: white; }
        .opt-wrong { background: #dc2626 !important; border-color: #ef4444 !important; color: white; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto flex justify-between items-center mb-8">
        <div>
            <h1 class="font-tech text-2xl text-sky-400">TECH_EXAM v1.4</h1>
            <p id="grade-display" class="text-xs text-slate-500 uppercase tracking-widest">Ngẫu nhiên câu hỏi & đáp án</p>
        </div>
        <div id="timer-box" class="glass px-6 py-2 rounded-full border-sky-500/50 hidden">
            <span id="timer" class="font-tech text-xl text-sky-400">15:00</span>
        </div>
    </div>

    <div class="max-w-4xl mx-auto">
        <!-- MÀN HÌNH 1: CHỌN KHỐI -->
        <div id="screen-1" class="text-center py-12">
            <h2 class="text-3xl font-bold mb-10 text-white">Chọn Khối Lớp</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-2xl mx-auto">
                <button onclick="selectGrade(10)" class="btn-tech glass p-8 rounded-2xl text-xl font-bold">CÔNG NGHỆ 10</button>
                <button onclick="selectGrade(11)" class="btn-tech glass p-8 rounded-2xl text-xl font-bold">CÔNG NGHỆ 11</button>
            </div>
        </div>

        <!-- MÀN HÌNH 2: CHỌN HÌNH THỨC -->
        <div id="screen-2" class="hidden text-center py-12">
            <h2 id="screen-2-title" class="text-3xl font-bold mb-10 text-white">Chọn Hình Thức</h2>
            <div class="flex flex-col md:flex-row justify-center gap-6">
                <button onclick="selectType('multiple')" class="btn-tech glass p-8 rounded-2xl text-xl font-bold w-full md:w-80">Trắc Nghiệm (30 câu)</button>
            </div>
            <button onclick="goScreen(1)" class="mt-8 text-slate-500 hover:text-white block mx-auto">← Quay lại</button>
        </div>

        <!-- MÀN HÌNH 3: LÀM BÀI -->
        <div id="screen-3" class="hidden">
            <div id="quiz-container" class="space-y-8 mb-32"></div>
            <div class="fixed bottom-0 left-0 w-full glass p-4 flex justify-center border-t border-sky-500/30 z-50">
                <button id="submit-btn" onclick="confirmSubmit()" class="bg-sky-600 hover:bg-sky-500 text-white px-12 py-3 rounded-xl font-bold uppercase tracking-widest transition-all">Nộp Bài</button>
            </div>
        </div>

        <!-- MÀN HÌNH 4: KẾT QUẢ -->
        <div id="screen-4" class="hidden text-center py-12 space-y-6">
            <h2 class="font-tech text-4xl text-sky-400">KẾT QUẢ</h2>
            <div class="glass p-10 rounded-3xl inline-block min-w-[300px]">
                <p id="score-text" class="text-6xl font-bold text-white">0/30</p>
            </div>
            <div class="flex flex-col items-center gap-4 pt-8">
                <button onclick="showReview()" class="bg-emerald-600 hover:bg-emerald-500 px-10 py-3 rounded-full uppercase text-sm font-bold w-64">Xem lại đáp án</button>
                <button onclick="location.reload()" class="btn-tech glass px-10 py-3 rounded-full uppercase text-sm font-bold w-64 text-white">Làm đề mới (Tráo câu hỏi)</button>
            </div>
        </div>
    </div>

    <script>
        // CƠ SỞ DỮ LIỆU CÂU HỎI (Rút gọn để hiển thị, bạn hãy giữ nguyên bộ câu hỏi cũ của bạn ở đây)
        const questionsDB = {
            10: { multiple: [ 
                /* ... copy 30 câu khối 10 của bạn vào đây ... */ 
                { question: "Ren ngoài (còn gọi là ren trục) là loại ren được hình thành ở đâu?", options: ["Mặt trong của lỗ.", "Mặt ngoài của chi tiết.", "Mặt phẳng cắt của chi tiết.", "Giữa mối ghép hai chi tiết."], answer: 1 },
                // ... (Các câu còn lại)
            ]},
            11: { multiple: [
                { question: "Cơ cấu trục khuỷu thanh truyền bao gồm các chi tiết chính nào?", options: ["Pít tông, trục cam, trục khuỷu, bánh đà.", "Pít tông, thanh truyền, xupap, bánh đà.", "Pít tông, thanh truyền, trục khuỷu, bánh đà.", "Trục cam, con đội, đũa đẩy, cần mở."], answer: 2 },
                { question: "Chi tiết nào trực tiếp nhận áp lực của khí cháy để truyền lực cho trục khuỷu?", options: ["Pít tông.", "Thanh truyền.", "Xupap.", "Bánh đà."], answer: 0 },
                { question: "Cấu tạo của pít tông gồm những phần nào?", options: ["Đỉnh, đầu, chốt pít tông.", "Đỉnh, đầu, thân.", "Xéc măng khí, xéc măng dầu, thân.", "Đỉnh, xéc măng, lỗ gài chốt."], answer: 1 },
                { question: "Nhiệm vụ của xéc măng dầu là gì?", options: ["Bao kín buồng cháy không cho khí lọt xuống các te.", "Ngăn dầu bôi trơn từ các te sục lên buồng cháy.", "Dẫn hướng cho pít tông chuyển động trong xi lanh.", "Truyền lực từ pít tông cho thanh truyền."], answer: 1 },
                { question: "Đầu to của thanh truyền được lắp với chi tiết nào?", options: ["Chốt pít tông.", "Cổ khuỷu.", "Chốt khuỷu.", "Bánh đà."], answer: 2 },
                { question: "Trục quay của trục khuỷu được gọi là gì?", options: ["Chốt khuỷu.", "Cổ khuỷu.", "Má khuỷu.", "Đối trọng."], answer: 1 },
                { question: "Chi tiết nào giúp trục khuỷu quay đều nhờ khả năng lưu trữ động năng?", options: ["Thanh truyền.", "Pít tông.", "Bánh đà.", "Trục cam."], answer: 2 },
                { question: "Nhiệm vụ của cơ cấu phối khí là gì?", options: ["Đóng, mở cửa nạp và cửa thải đúng thời điểm.", "Biến chuyển động tịnh tiến thành chuyển động quay.", "Đưa dầu bôi trơn đến các bề mặt ma sát.", "Giữ cho nhiệt độ không vượt quá giới hạn."], answer: 0 },
                { question: "Ở động cơ 4 kỳ, số vòng quay trục cam bằng bao nhiêu so với trục khuỷu?", options: ["Bằng nhau.", "Gấp 2 lần.", "Bằng 1/2 lần.", "Gấp 4 lần."], answer: 2 },
                { question: "Buồng cháy động cơ được tạo thành bởi các chi tiết nào?", options: ["Thân máy, xi lanh và pít tông.", "Nắp máy, xi lanh và đỉnh pít tông.", "Xi lanh, trục khuỷu và thanh truyền.", "Pít tông, thanh truyền và trục khuỷu."], answer: 1 },
                { question: "Vai trò của ô tô trong sản xuất là?", options: ["Chở nhiều người và hàng hóa", "Phục vụ cứu thương", "Vận chuyển hàng hóa và nguyên vật liệu", "Tất cả đều sai"], answer: 2 },
                { question: "Sơ đồ hệ thống cơ khí động lực là:", options: ["Nguồn động lực → Máy công tác → Hệ thống truyền động", "Nguồn động lực → Hệ thống truyền động → Máy công tác", "Máy công tác → Hệ thống truyền động → Nguồn động lực", "Hệ thống truyền động → Nguồn động lực → Máy công tác"], answer: 1 },
                { question: "Nghề thiết kế bản vẽ, tính toán sản phẩm máy móc thuộc lĩnh vực nào?", options: ["Thiết kế kĩ thuật cơ khí động lực", "Lắp ráp máy", "Chế tạo máy", "Sửa chữa máy"], answer: 0 },
                { question: "Vai trò của nguồn động lực là gì?", options: ["Đảm bảo hệ thống làm việc", "Truyền và biến đổi năng lượng", "Biến đổi năng lượng", "Cung cấp năng lượng cho hệ thống"], answer: 3 },
                { question: "Sử dụng và bảo dưỡng hệ thống truyền lực:", options: ["Chỉ kiểm tra khi hỏng", "Kiểm tra bảo dưỡng theo định kì", "Không cần mở li hợp", "Không cần kéo thắng tay"], answer: 1 },
                { question: "Bộ phận nào tạo ra mô men chủ động để ô tô chuyển động?", options: ["Hệ thống truyền lực.", "Động cơ.", "Bánh xe.", "Hệ thống lái."], answer: 1 },
                { question: "Hệ thống truyền lực trên ô tô bao gồm:", options: ["Động cơ, li hợp", "Bánh xe, hệ thống treo", "Li hợp, hộp số, các đăng, vi sai", "Xi lanh chính, xi lanh công tác"], answer: 2 },
                { question: "Chức năng chính của hệ thống treo là gì?", options: ["Điều khiển hướng chuyển động.", "Truyền biến đổi mô men.", "Giảm va đập, giúp xe chạy êm dịu.", "Dừng hẳn xe khi cần."], answer: 2 },
                { question: "Hệ thống điều khiển hướng chuyển động của ô tô là:", options: ["Hệ thống phanh.", "Hệ thống truyền lực.", "Hệ thống lái.", "Khung vỏ xe."], answer: 2 },
                { question: "Tác động tiêu cực của ô tô là:", options: ["Cơ giới hóa sản xuất.", "Vận tải chủ yếu.", "Gây ô nhiễm môi trường và tai nạn.", "Hỗ trợ cứu nạn."], answer: 2 },
                { question: "Cơ cấu trục khuỷu thanh truyền có bộ phận nào?", options: ["Pít tông, thanh truyền, trục khuỷu, bánh đà", "Pít tông, thanh truyền, xu páp", "Thân máy, nắp máy", "Trục cam, con đội"], answer: 0 },
                { question: "Hệ thống phanh có chức năng chính là:", options: ["Giảm tốc độ và dừng xe.", "Giúp xe chuyển hướng.", "Cung cấp điện.", "Làm ổn định động cơ."], answer: 0 },
                { question: "Nhiệm vụ nối ngắt dòng truyền mômen từ động cơ đến hộp số là của?", options: ["Hộp số", "Các đăng", "Vi sai", "Li hợp"], answer: 3 },
                { question: "Phân loại động cơ theo nhiên liệu:", options: ["Làm mát nước/gió", "2 kì / 4 kì", "Xăng, Diesel, Gas", "1 xi lanh / nhiều xi lanh"], answer: 2 },
                { question: "Nếu hệ thống treo bị hỏng, xe di chuyển sẽ:", options: ["Rung lắc mạnh khó kiểm soát", "Đi nhanh hơn", "Ngắt điện", "Tiết kiệm nhiên liệu"], answer: 0 },
                { question: "Nếu bầu lọc dầu bị tắc hoàn toàn, dầu sẽ đi đâu?", options: ["Chảy ngược lại các-te", "Đi qua két làm mát", "Mở van an toàn đi thẳng vào đường dầu chính", "Ngắt dòng truyền động"], answer: 2 },
                { question: "Nhận định chính xác về xử lí khí NOx:", options: ["Xăng và Diesel xử lí giống hệt nhau", "Diesel dùng bộ xúc tác tam nguyên", "Xăng dùng bộ xúc tác khử, Diesel dùng EGR", "Diesel oxy hóa NOx thành CO2"], answer: 2 },
                { question: "Nhiệm vụ của hệ thống bôi trơn là gì?", options: ["Cung cấp hòa khí", "Đưa dầu đến các bề mặt giảm ma sát", "Quay trục khuỷu", "Đốt cháy nhiên liệu"], answer: 1 },
                { question: "Hệ thống làm mát có nhiệm vụ chính là:", options: ["Giảm tiếng ồn", "Cung cấp dầu", "Giữ nhiệt độ chi tiết trong giới hạn", "Lọc bụi không khí"], answer: 2 },
                { question: "Hệ thống làm quay trục khuỷu để khởi động máy là:", options: ["Hệ thống đánh lửa.", "Hệ thống khởi động.", "Hệ thống nhiên liệu.", "Hệ thống bôi trơn."], answer: 1 }
            ]}
        };

        let quizState = { grade: 0, type: '', timeLeft: 900, timerInterval: null, userAnswers: {}, isReview: false, currentQuestions: [] };

        // Thuật toán tráo ngẫu nhiên Fisher-Yates
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function selectGrade(g) {
            quizState.grade = g;
            document.getElementById('grade-display').innerText = `Công Nghệ ${g}`;
            goScreen(2);
        }

        function selectType(t) {
            quizState.type = t;
            quizState.userAnswers = {};
            quizState.isReview = false;
            
            // Xử lý tráo câu hỏi và tráo đáp án bên trong mỗi câu
            let rawData = JSON.parse(JSON.stringify(questionsDB[quizState.grade][t])); // Clone dữ liệu
            
            // Tráo đáp án bên trong từng câu trước
            rawData.forEach(q => {
                let correctAnswerText = q.options[q.answer]; // Lưu nội dung đáp án đúng
                shuffle(q.options); // Tráo mảng options
                q.answer = q.options.indexOf(correctAnswerText); // Tìm lại index mới của đáp án đúng
            });

            // Sau đó tráo thứ tự các câu hỏi
            quizState.currentQuestions = shuffle(rawData);

            goScreen(3);
            startTimer();
            renderQuiz();
        }

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';
            
            quizState.currentQuestions.forEach((q, idx) => {
                const qDiv = document.createElement('div');
                qDiv.className = "glass p-6 rounded-2xl space-y-4";
                qDiv.innerHTML = `
                    <p class="font-bold text-sky-400">Câu ${idx+1}</p>
                    <p class="text-lg">${q.question}</p>
                    <div class="grid grid-cols-1 gap-3">
                        ${q.options.map((opt, i) => {
                            let cls = "border-white/10 hover:bg-white/5 text-slate-300";
                            let icon = "";
                            if(quizState.isReview) {
                                if(i === q.answer) { cls = "opt-correct"; icon = " ✓"; }
                                else if(quizState.userAnswers[idx] === i) { cls = "opt-wrong"; icon = " ✗"; }
                            } else if(quizState.userAnswers[idx] === i) {
                                cls = "selected-opt text-white border-sky-500";
                            }
                            return `<button ${quizState.isReview ? 'disabled' : ''} onclick="pick(${idx}, ${i}, this)" class="option-btn text-left p-4 rounded-xl border transition-all ${cls}">
                                <span class="font-bold mr-2">${String.fromCharCode(65 + i)}.</span> ${opt} ${icon}
                            </button>`;
                        }).join('')}
                    </div>
                `;
                container.appendChild(qDiv);
            });
        }

        function pick(qIdx, optIdx, btn) {
            quizState.userAnswers[qIdx] = optIdx;
            btn.closest('.grid').querySelectorAll('.option-btn').forEach(b => {
                b.classList.remove('selected-opt', 'text-white', 'border-sky-500');
                b.classList.add('text-slate-300', 'border-white/10');
            });
            btn.classList.add('selected-opt', 'text-white', 'border-sky-500');
        }

        function startTimer() {
            clearInterval(quizState.timerInterval);
            document.getElementById('timer-box').classList.remove('hidden');
            quizState.timeLeft = 900;
            quizState.timerInterval = setInterval(() => {
                quizState.timeLeft--;
                let m = Math.floor(quizState.timeLeft / 60);
                let s = quizState.timeLeft % 60;
                document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
                if(quizState.timeLeft <= 0) submitExam();
            }, 1000);
        }

        function goScreen(id) {
            document.querySelectorAll('[id^="screen-"]').forEach(s => s.classList.add('hidden'));
            document.getElementById(`screen-${id}`).classList.remove('hidden');
        }

        function confirmSubmit() { if(confirm("Bạn có chắc muốn nộp bài?")) submitExam(); }

        function submitExam() {
            clearInterval(quizState.timerInterval);
            let score = 0;
            quizState.currentQuestions.forEach((q, i) => { if(quizState.userAnswers[i] === q.answer) score++; });
            document.getElementById('score-text').innerText = `${score}/${quizState.currentQuestions.length}`;
            document.getElementById('timer-box').classList.add('hidden');
            goScreen(4);
            window.scrollTo(0,0);
        }

        function showReview() {
            quizState.isReview = true;
            goScreen(3);
            document.getElementById('submit-btn').innerText = "Về màn hình kết quả";
            document.getElementById('submit-btn').onclick = () => goScreen(4);
            renderQuiz();
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
