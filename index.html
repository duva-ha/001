<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECH_EXAM v2.4 - Timed & Shuffled</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0ea5e9; --bg: #0f172a; }
        body { background: var(--bg); color: #f1f5f9; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .font-tech { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-tech { transition: all 0.3s; border: 1px solid rgba(14, 165, 233, 0.3); cursor: pointer; }
        .btn-tech:hover:not(:disabled) { background: var(--primary); color: white; box-shadow: 0 0 20px var(--primary); }
        .hidden { display: none; }
        .active-tf { background: #0ea5e9 !important; color: white !important; border-color: #38bdf8 !important; }
        .correct-tf { background: #059669 !important; color: white !important; }
        .wrong-tf { background: #dc2626 !important; color: white !important; }
        .selected-mc { background: rgba(14, 165, 233, 0.3); border-color: #0ea5e9; color: white; }
        #timer-display.low-time { color: #ef4444; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto flex justify-between items-center mb-8">
        <div>
            <h1 class="font-tech text-2xl text-sky-400 tracking-tighter">TECH_EXAM v2.4</h1>
            <p id="grade-display" class="text-xs text-slate-500 uppercase tracking-widest font-semibold">Hệ thống ôn tập Công nghệ</p>
        </div>
        <div id="timer-container" class="hidden glass px-6 py-2 rounded-full border border-sky-500/50">
            <span class="text-xs text-slate-400 uppercase mr-2 font-bold">Thời gian:</span>
            <span id="timer-display" class="font-tech text-xl text-sky-400">25:00</span>
        </div>
    </div>

    <div class="max-w-4xl mx-auto">
        <!-- SCREEN 1: GRADE -->
        <div id="screen-1" class="text-center py-12">
            <h2 class="text-3xl font-bold mb-10">Chọn Khối Lớp</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-md mx-auto">
                <button onclick="selectGrade(10)" class="btn-tech glass p-8 rounded-2xl text-xl font-bold">KHỐI 10</button>
                <button onclick="selectGrade(11)" class="btn-tech glass p-8 rounded-2xl text-xl font-bold">KHỐI 11</button>
            </div>
        </div>

        <!-- SCREEN 2: TYPE -->
        <div id="screen-2" class="hidden text-center py-12">
            <h2 id="screen-2-title" class="text-3xl font-bold mb-10 text-sky-400 uppercase">CHỌN HÌNH THỨC</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-2xl mx-auto">
                <button onclick="prepareQuiz('multiple')" class="btn-tech glass p-8 rounded-2xl text-xl font-bold">Trắc nghiệm 1 đáp án</button>
                <button onclick="prepareQuiz('tf')" class="btn-tech glass p-8 rounded-2xl text-xl font-bold">Trắc nghiệm Đúng/Sai</button>
            </div>
            <button onclick="goScreen(1)" class="mt-8 text-slate-500 hover:text-white transition-colors">← Quay lại</button>
        </div>

        <!-- SCREEN 3: QUIZ -->
        <div id="screen-3" class="hidden">
            <div id="quiz-container" class="space-y-8 mb-32"></div>
            <div class="fixed bottom-0 left-0 w-full glass p-4 flex justify-center border-t border-sky-500/30 z-50">
                <button id="submit-btn" onclick="confirmSubmit()" class="bg-sky-600 hover:bg-sky-500 text-white px-12 py-3 rounded-xl font-bold uppercase tracking-widest transition-all">Nộp Bài</button>
            </div>
        </div>

        <!-- SCREEN 4: RESULT -->
        <div id="screen-4" class="hidden text-center py-12">
            <h2 class="font-tech text-4xl text-sky-400 mb-6">KẾT QUẢ</h2>
            <div class="glass p-10 rounded-3xl inline-block mb-8 min-w-[200px]">
                <p id="score-text" class="text-6xl font-bold text-white">0</p>
                <p class="text-slate-400 mt-2 font-semibold tracking-widest uppercase text-xs">Điểm hệ 10</p>
                <p id="detail-text" class="text-sm text-sky-400 mt-2 font-mono">Đúng 0/0 câu</p>
            </div>
            <div class="flex flex-col items-center gap-4">
                <button onclick="showReview()" class="bg-emerald-600 hover:bg-emerald-500 px-10 py-3 rounded-full font-bold w-64 transition-all">XEM LẠI ĐÁP ÁN</button>
                <button onclick="location.reload()" class="btn-tech glass px-10 py-3 rounded-full font-bold w-64 transition-all">LÀM ĐỀ KHÁC</button>
            </div>
        </div>
    </div>

    <script>
        const questionsDB = {
            10: {
                multiple: [
                    { question: "Vẽ kĩ thuật có vai trò gì trong đời sống?", options: ["Sử dụng sản phẩm hiệu quả và an toàn", "Để chế tạo sản phẩm", "Để lắp ráp sản phẩm", "Để kiểm tra sản phẩm"], answer: 0 }
                ],
                tf: [
                    { q: "Đánh giá đúng/sai về quy ước vẽ ren nhìn thấy:", sub: [
                        { t: "Đường đỉnh ren và đường giới hạn ren được vẽ bằng nét liền đậm.", a: "Đ" },
                        { t: "Đường chân ren được vẽ bằng nét đứt mảnh.", a: "S" },
                        { t: "Vòng đỉnh ren được vẽ đóng kín bằng nét liền đậm.", a: "S" },
                        { t: "Vòng chân ren được vẽ hở khoảng 1/4 vòng bằng nét liền mảnh.", a: "Đ" }
                    ]}
                ]
            },
            11: {
                multiple: [
                    { question: "Chu trình làm việc của động cơ 4 kỳ diễn ra theo thứ tự nào?", options: ["Nạp - Nén - Nổ - Xả", "Nén - Nạp - Nổ - Xả", "Nạp - Nổ - Nén - Xả", "Xả - Nạp - Nén - Nổ"], answer: 0 },
                    { question: "Ở động cơ Diesel, nhiên liệu được đưa vào xi lanh ở thời điểm nào?", options: ["Đầu kỳ nạp", "Cuối kỳ nạp", "Cuối kỳ nén", "Đầu kỳ nén"], answer: 2 },
                    { question: "Thân máy và nắp máy thường được làm bằng vật liệu gì?", options: ["Đồng", "Nhôm hoặc gang", "Nhựa kỹ thuật", "Thép chịu lực"], answer: 1 },
                    { question: "Hệ thống nào không có trên động cơ Diesel?", options: ["Hệ thống bôi trơn", "Hệ thống làm mát", "Hệ thống đánh lửa", "Hệ thống khởi động"], answer: 2 },
                    { question: "Nhiệm vụ của trục khuỷu là gì?", options: ["Đóng mở cửa nạp xả", "Biến chuyển động tịnh tiến thành chuyển động quay", "Phun nhiên liệu", "Tạo tia lửa điện"], answer: 1 },
                    { question: "Cơ cấu trục khuỷu thanh truyền bao gồm các chi tiết chính nào?", options: ["Pít tông, trục cam, trục khuỷu, bánh đà", "Pít tông, thanh truyền, xupap, bánh đà", "Pít tông, thanh truyền, trục khuỷu, bánh đà", "Trục cam, con đội, đũa đẩy, cần mở"], answer: 2 },
                    { question: "Chi tiết nào trực tiếp nhận áp lực của khí cháy để truyền lực cho trục khuỷu?", options: ["Pít tông", "Thanh truyền", "Xupap", "Bánh đà"], answer: 0 },
                    { question: "Cấu tạo của pít tông gồm những phần nào?", options: ["Đỉnh, đầu, chốt pít tông", "Đỉnh, đầu, thân", "Xéc măng khí, xéc măng dầu, thân", "Đỉnh, xéc măng, lỗ gài chốt"], answer: 1 },
                    { question: "Nhiệm vụ của xéc măng dầu là gì?", options: ["Bao kín buồng cháy không cho khí lọt xuống các te", "Ngăn dầu bôi trơn từ các te sục lên buồng cháy", "Dẫn hướng cho pít tông chuyển động trong xi lanh", "Truyền lực từ pít tông cho thanh truyền"], answer: 1 },
                    { question: "Đầu to của thanh truyền được lắp với chi tiết nào?", options: ["Chốt pít tông", "Cổ khuỷu", "Chốt khuỷu", "Bánh đà"], answer: 2 },
                    { question: "Trục quay của trục khuỷu được gọi là gì?", options: ["Chốt khuỷu", "Cổ khuỷu", "Má khuỷu", "Đối trọng"], answer: 1 },
                    { question: "Chi tiết nào có vai trò giúp trục khuỷu quay đều nhờ khả năng lưu trữ động năng?", options: ["Thanh truyền", "Pít tông", "Bánh đà", "Trục cam"], answer: 2 },
                    { question: "Nhiệm vụ của cơ cấu phối khí là gì?", options: ["Đóng, mở các cửa nạp và cửa thải đúng thời điểm", "Biến chuyển động tịnh tiến thành chuyển động quay", "Đưa dầu bôi trơn đến các bề mặt ma sát", "Giữ cho nhiệt độ các chi tiết không vượt quá giới hạn"], answer: 0 },
                    { question: "Ở động cơ 4 kỳ, số vòng quay của trục cam bằng bao nhiêu so với số vòng quay của trục khuỷu?", options: ["Bằng nhau", "Gấp 2 lần", "Bằng 1/2 lần", "Gấp 4 lần"], answer: 2 },
                    { question: "Buồng cháy của động cơ được tạo thành bởi các chi tiết nào?", options: ["Thân máy, xi lanh và pít tông", "Nắp máy, xi lanh và đỉnh pít tông", "Xi lanh, trục khuỷu và thanh truyền", "Pít tông, thanh truyền và trục khuỷu"], answer: 1 },
                    { question: "Vai trò của ô tô trong sản xuất là gì?", options: ["Chở nhiều người và hàng hóa đi trên nhiều địa hình", "Phục vụ các công việc đặc thù như cứu thương", "Vận chuyển hàng hóa và nguyên vật liệu sản xuất", "Vận chuyển người đi du lịch"], answer: 2 },
                    { question: "Sơ đồ hệ thống cơ khí động lực đúng là?", options: ["Nguồn động lực → Máy công tác → Hệ thống truyền động", "Nguồn động lực → Hệ thống truyền động → Máy công tác", "Máy công tác → Hệ thống truyền động → Nguồn động lực", "Hệ thống truyền động → Nguồn động lực → Máy công tác"], answer: 1 },
                    { question: "Nghề nghiệp xây dựng bản vẽ, tính toán, mô phỏng thiết kế máy móc động lực là?", options: ["Thiết kế kĩ thuật cơ khí động lực", "Lắp ráp máy, thiết bị cơ khí động lực", "Chế tạo máy thiết bị cơ khí động lực", "Bảo dưỡng, sửa chữa máy, thiết bị cơ khí động lực"], answer: 0 },
                    { question: "Vai trò của nguồn động lực trong hệ thống cơ khí động lực là?", options: ["Đảm bảo hệ thống làm việc ở môi trường khác nhau", "Truyền và biến đổi năng lượng", "Biến đổi năng lượng từ nguồn đến máy công tác", "Cung cấp năng lượng cho hệ thống hoạt động"], answer: 3 },
                    { question: "Sử dụng và bảo dưỡng hệ thống truyền lực cần lưu ý gì?", options: ["Chỉ kiểm tra khi có thiết bị hỏng hóc", "Các bộ phận cần được kiểm tra bảo dưỡng định kì", "Khi chuyển số không cần mở li hợp", "Xe tự động không cần kéo thắng tay khi dừng"], answer: 1 },
                    { question: "Bộ phận nào là 'nguồn động lực' tạo ra mô men chủ động cho ô tô?", options: ["Hệ thống truyền lực", "Động cơ", "Bánh xe", "Hệ thống lái"], answer: 1 },
                    { question: "Hệ thống truyền lực trên ô tô bao gồm các cụm chính nào?", options: ["Động cơ, li hợp, hộp số", "Bánh xe, hệ thống treo, hệ thống lái", "Li hợp, hộp số, các đăng, truyền lực chính và vi sai", "Xi lanh chính, xi lanh công tác, cơ cấu phanh"], answer: 2 },
                    { question: "Chức năng chính của hệ thống treo trên ô tô là gì?", options: ["Điều khiển hướng chuyển động", "Truyền và biến đổi mô men", "Giảm va đập từ mặt đường, giúp xe êm dịu", "Giảm tốc độ hoặc dừng hẳn xe"], answer: 2 },
                    { question: "Hệ thống điều khiển hướng chuyển động hoặc giữ xe thẳng ổn định?", options: ["Hệ thống phanh", "Hệ thống truyền lực", "Hệ thống lái", "Khung vỏ xe"], answer: 2 },
                    { question: "Tác động tiêu cực của ô tô đối với xã hội và môi trường là?", options: ["Giúp cơ giới hóa sản xuất", "Là phương tiện giao thông chủ yếu", "Gây ô nhiễm môi trường và tai nạn giao thông", "Hỗ trợ đắc lực cứu hộ cứu nạn"], answer: 2 },
                    { question: "Cơ cấu trục khuỷu thanh truyền bao gồm bộ phận nào?", options: ["Pít tông, thanh truyền, trục khuỷu, bánh đà", "Pít tông, thanh truyền, trục khuỷu, bánh đà, xu páp", "Pít tông, thanh truyền, trục khuỷu", "Pít tông, thanh truyền, trục khuỷu, thân máy"], answer: 0 },
                    { question: "Hệ thống phanh trên ô tô có chức năng chính là?", options: ["Giảm tốc độ và dừng xe khi cần thiết", "Giúp xe chuyển hướng khi quay vô lăng", "Cung cấp năng lượng cho hệ thống điện", "Làm động cơ hoạt động ổn định"], answer: 0 },
                    { question: "Bộ phận nối ngắt dòng truyền mômen từ động cơ đến bánh xe chủ động?", options: ["Hộp số", "Truyền lực các đăng", "Truyền lực chính và vi sai", "Li hợp"], answer: 3 },
                    { question: "Theo nhiên liệu sử dụng, động cơ đốt trong được phân loại thành?", options: ["Làm mát bằng nước và không khí", "Động cơ 2 kì và 4 kì", "Động cơ xăng, Diesel, và gas", "Động cơ 1 xi lanh và nhiều xi lanh"], answer: 2 },
                    { question: "Nếu hệ thống treo bị hỏng, điều gì dễ xảy ra nhất trên đường gồ ghề?", options: ["Xe bị rung lắc mạnh khó kiểm soát", "Xe đi nhanh hơn", "Hệ thống điện ngừng hoạt động", "Xe tiêu thụ nhiều nhiên liệu hơn"], answer: 0 },
                    { question: "Trong hệ thống bôi trơn, nếu bầu lọc bị tắc hoàn toàn, hệ thống xử lý thế nào?", options: ["Dầu mở van an toàn chảy ngược lại các-te", "Dầu đi qua van khống chế lưu lượng qua két làm mát", "Van an toàn mở cho dầu đi thẳng vào đường dầu chính", "Hệ thống ngắt dòng truyền mô men động cơ"], answer: 2 },
                    { question: "So sánh xử lí khí NOx giữa động cơ xăng và Diesel?", options: ["Cả hai dùng bộ xử lí ba thành phần khử NOx", "Xăng dùng bộ lọc hạt, Diesel dùng bộ xúc tác", "Xăng dùng bộ xúc tác khử, Diesel dùng hệ thống EGR", "Diesel oxy hóa thành CO2, xăng dùng tia lửa điện"], answer: 2 },
                    { question: "Nhiệm vụ của hệ thống bôi trơn là gì?", options: ["Cung cấp hòa khí sạch vào xi lanh", "Đưa dầu đến bề mặt làm việc để giảm ma sát", "Làm quay trục khuỷu để khởi động", "Đốt cháy nhiên liệu Diesel"], answer: 1 },
                    { question: "Hệ thống làm mát có nhiệm vụ chính là?", options: ["Giảm tiếng ồn khi vận hành", "Cung cấp dầu bôi trơn", "Giữ nhiệt độ chi tiết không vượt giới hạn cho phép", "Lọc sạch bụi bẩn trong không khí"], answer: 2 },
                    { question: "Hệ thống chỉ có nhiệm vụ làm quay trục khuỷu đến tốc độ để tự nổ máy?", options: ["Hệ thống đánh lửa", "Hệ thống khởi động", "Hệ thống nhiên liệu", "Hệ thống bôi trơn"], answer: 1 }
                ],
                tf: [
                    { q: "Câu 1: Khi tìm hiểu về hệ thống bôi trơn và làm mát...", sub: [
                        { t: "Hệ thống bôi trơn cưỡng bức sử dụng bơm dầu để đưa dầu bôi trơn đến các bề mặt ma sát dưới áp suất cao.", a: "Đ" },
                        { t: "Dầu bôi trơn ngoài nhiệm vụ giảm ma sát còn có tác dụng làm mát, tẩy rửa và bảo vệ các bề mặt chi tiết.", a: "Đ" },
                        { t: "Trong hệ thống làm mát bằng nước, van hằng nhiệt sẽ mở đường cho nước về két làm mát khi nhiệt độ nước còn thấp hơn 80*C.", a: "S" },
                        { t: "Hệ thống làm mát bằng không khí sử dụng các cánh tản nhiệt đúc bao ngoài xi lanh và nắp máy để tăng diện tích tỏa nhiệt.", a: "Đ" }
                    ]},
                    { q: "Câu 2: Về hệ thống nhiên liệu, đánh lửa và xử lí khí thải...", sub: [
                        { t: "Hệ thống phun xăng (EFI) sử dụng các cảm biến để thu thập thông tin và bộ điều khiển (ECU) để quyết định lượng xăng phun phù hợp.", a: "Đ" },
                        { t: "Ở động cơ Diesel, nhiên liệu được phun vào xi lanh ở cuối kì nén và tự bốc cháy do áp suất và nhiệt độ cao.", a: "Đ" },
                        { t: "Hệ thống đánh lửa trên động cơ xăng có nhiệm vụ tạo ra tia lửa điện để đốt cháy hòa khí đúng thời điểm.", a: "Đ" },
                        { t: "Hệ thống EGR trên động cơ Diesel giúp giảm nồng độ khí thải độc hại bằng cách đưa một phần khí thải quay trở lại đường nạp.", a: "Đ" }
                    ]},
                    { q: "Câu 3: Về vai trò và cấu tạo chung của ô tô...", sub: [
                        { t: "Ô tô là phương tiện giao thông vận tải đường bộ chủ yếu, giúp thực hiện cơ giới hóa các hoạt động sản xuất và đời sống.", a: "Đ" },
                        { t: "Ô tô có mặt tiêu cực là gây ô nhiễm môi trường sinh thái, cạn kiệt tài nguyên thiên nhiên và gây tai nạn giao thông.", a: "Đ" },
                        { t: "Hệ thống truyền lực trên ô tô có chức năng truyền và biến đổi mô men từ động cơ đến các bánh xe chủ động.", a: "Đ" },
                        { t: "Hệ thống lái và hệ thống phanh là những bộ phận không bắt buộc phải có trên các loại xe chuyên dụng.", a: "S" }

                        { t: "Kì nén động cơ xăng, hai xupáp đều đóng, hòa khí bị nén.", a: "Đ" },

                    ]},
                    { q: "Câu 24: Chi tiết cơ cấu...", sub: [
                        { t: "Đỉnh pít tông tiếp nhận áp lực khí cháy, có dạng bằng, lồi, lõm.", a: "Đ" },
                        { t: "Thân thanh truyền lắp với chốt pít tông.", a: "S" },
                        { t: "Má khuỷu nối cổ khuỷu và chốt khuỷu.", a: "Đ" },
                        { t: "Bánh đà giúp trục khuỷu quay đều.", a: "Đ" }
                    ]}
                ]

        };

        let state = { 
            grade: 0, 
            type: '', 
            list: [], 
            userAns: {}, 
            isReview: false, 
            timer: null, 
            timeLeft: 1500 // 25 minutes in seconds
        };

        function selectGrade(g) {
            state.grade = g;
            document.getElementById('grade-display').innerText = `CÔNG NGHỆ ${g}`;
            goScreen(2);
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function startTimer() {
            clearInterval(state.timer);
            state.timeLeft = 1500;
            updateTimerDisplay();
            document.getElementById('timer-container').classList.remove('hidden');
            
            state.timer = setInterval(() => {
                state.timeLeft--;
                updateTimerDisplay();
                if (state.timeLeft <= 0) {
                    clearInterval(state.timer);
                    alert("Hết thời gian! Hệ thống sẽ tự động nộp bài.");
                    submit();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const min = Math.floor(state.timeLeft / 60);
            const sec = state.timeLeft % 60;
            const display = document.getElementById('timer-display');
            display.innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
            if (state.timeLeft < 300) display.classList.add('low-time');
            else display.classList.remove('low-time');
        }

        function prepareQuiz(type) {
            state.type = type;
            state.isReview = false;
            state.userAns = {};
            let data = JSON.parse(JSON.stringify(questionsDB[state.grade][type]));
            if (data.length === 0) { alert("Dữ liệu đang cập nhật!"); return; }
            
            // SHUFFLE QUESTIONS
            state.list = shuffle(data);
            
            goScreen(3);
            render();
            startTimer();
        }

        function render() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';
            state.list.forEach((q, idx) => {
                const div = document.createElement('div');
                div.className = "glass p-6 rounded-2xl transition-all border-l-4 border-transparent hover:border-sky-500";
                if (state.type === 'tf') {
                    div.innerHTML = `<p class="text-sky-400 font-bold mb-4 text-lg">Câu ${idx+1}: ${q.q}</p>`;
                    q.sub.forEach((s, sIdx) => {
                        const subId = `${idx}_${sIdx}`;
                        const userChoice = state.userAns[subId];
                        let btnD = "border-white/10", btnS = "border-white/10";
                        if (state.isReview) {
                            btnD = s.a === "Đ" ? "correct-tf" : (userChoice === "Đ" ? "wrong-tf" : "opacity-30");
                            btnS = s.a === "S" ? "correct-tf" : (userChoice === "S" ? "wrong-tf" : "opacity-30");
                        } else if(userChoice === "Đ") btnD = "active-tf";
                        else if(userChoice === "S") btnS = "active-tf";
                        div.innerHTML += `
                            <div class="flex flex-col md:flex-row md:items-center justify-between p-4 border-b border-white/5 last:border-0 gap-3">
                                <span class="flex-1 text-sm leading-relaxed">${String.fromCharCode(97+sIdx)}) ${s.t}</span>
                                <div class="flex gap-2">
                                    <button onclick="pickTF('${subId}', 'Đ')" class="w-20 py-2 rounded-lg border font-bold text-xs transition-all ${btnD}" ${state.isReview?'disabled':''}>ĐÚNG</button>
                                    <button onclick="pickTF('${subId}', 'S')" class="w-20 py-2 rounded-lg border font-bold text-xs transition-all ${btnS}" ${state.isReview?'disabled':''}>SAI</button>
                                </div>
                            </div>`;
                    });
                } else {
                    div.innerHTML = `<p class="text-sky-400 font-bold mb-4 text-lg">Câu ${idx+1}: ${q.question}</p>
                        <div class="grid grid-cols-1 gap-3">
                            ${q.options.map((opt, i) => {
                                let cls = "border-white/10";
                                if(state.isReview) {
                                    if(i === q.answer) cls = "bg-emerald-600 border-emerald-500 text-white";
                                    else if(state.userAns[idx] === i) cls = "bg-red-600 border-red-500 text-white";
                                } else if(state.userAns[idx] === i) cls = "selected-mc";
                                return `<button onclick="pickMC(${idx}, ${i})" class="p-4 border rounded-xl text-left text-sm flex items-start transition-all ${cls}" ${state.isReview?'disabled':''}>
                                    <span class="font-bold mr-3 text-sky-500">${String.fromCharCode(65+i)}.</span> <span>${opt}</span>
                                </button>`;
                            }).join('')}
                        </div>`;
                }
                container.appendChild(div);
            });
        }

        function pickMC(qIdx, oIdx) { state.userAns[qIdx] = oIdx; render(); }
        function pickTF(id, val) { state.userAns[id] = val; render(); }
        function confirmSubmit() { if(confirm("Xác nhận nộp bài làm?")) submit(); }

        function submit() {
            clearInterval(state.timer);
            document.getElementById('timer-container').classList.add('hidden');
            let score = 0, correctCount = 0, totalCount = 0;
            if(state.type === 'tf') {
                state.list.forEach((q, idx) => {
                    q.sub.forEach((s, si) => {
                        totalCount++;
                        if(state.userAns[`${idx}_${si}`] === s.a) correctCount++;
                    });
                });
                score = (correctCount / totalCount) * 10;
            } else {
                totalCount = state.list.length;
                state.list.forEach((q, idx) => { if(state.userAns[idx] === q.answer) correctCount++; });
                score = (correctCount / totalCount) * 10;
            }
            document.getElementById('score-text').innerText = score.toFixed(2);
            document.getElementById('detail-text').innerText = `Đúng ${correctCount}/${totalCount} ý`;
            goScreen(4);
            window.scrollTo(0,0);
        }

        function showReview() {
            state.isReview = true;
            goScreen(3);
            const btn = document.getElementById('submit-btn');
            btn.innerText = "Quay lại kết quả";
            btn.onclick = () => goScreen(4);
            render();
            window.scrollTo(0,0);
        }

        function goScreen(id) {
            document.querySelectorAll('[id^="screen-"]').forEach(s => s.classList.add('hidden'));
            document.getElementById(`screen-${id}`).classList.remove('hidden');
        }
    </script>
</body>
</html>
