<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECH_EXAM v3.2 - Phân Quyền Hệ Thống</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <style>
        :root { --primary: #0ea5e9; --bg: #0f172a; }
        body { background: var(--bg); color: #f1f5f9; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .font-tech { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-tech { transition: all 0.3s; border: 1px solid rgba(14, 165, 233, 0.3); cursor: pointer; }
        .btn-tech:hover:not(:disabled) { background: var(--primary); color: white; box-shadow: 0 0 20px var(--primary); }
        .hidden { display: none; }
        .active-tf { background: #0ea5e9 !important; color: white !important; }
        .correct-tf { background: #059669 !important; }
        .wrong-tf { background: #dc2626 !important; }
        .selected-mc { background: rgba(14, 165, 233, 0.3); border-color: #0ea5e9; }
        #timer-display.low-time { color: #ef4444; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .section-header { border-left: 4px solid #0ea5e9; padding-left: 1rem; margin: 2rem 0 1.5rem 0; }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col justify-start min-h-screen">

    <div id="app-content" class="w-full">
        <div class="max-w-4xl mx-auto flex justify-between items-center mb-12">
            <div>
                <h1 class="font-tech text-2xl text-sky-400 tracking-tighter">TECH_EXAM v3.2</h1>
                <p id="grade-display" class="text-xs text-slate-500 uppercase tracking-widest font-semibold">Hệ thống ôn tập Công nghệ</p>
            </div>
            <div id="timer-container" class="hidden glass px-6 py-2 rounded-full border border-sky-500/50">
                <span id="timer-display" class="font-tech text-xl text-sky-400">25:00</span>
            </div>
        </div>

        <div class="max-w-4xl mx-auto">
            <div id="screen-1" class="py-12 space-y-12">
                <div class="text-center">
                    <h2 class="text-3xl font-bold mb-10 uppercase tracking-widest">Bạn là ai?</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-md mx-auto">
                        <button onclick="checkRole('teacher')" class="btn-tech glass p-8 rounded-2xl text-xl font-bold flex flex-col items-center gap-3">
                            <span class="text-3xl">👨‍🏫</span> GIÁO VIÊN
                        </button>
                        <button onclick="checkRole('student')" class="btn-tech glass p-8 rounded-2xl text-xl font-bold flex flex-col items-center gap-3">
                            <span class="text-3xl">👨‍🎓</span> HỌC SINH
                        </button>
                    </div>
                </div>

                <div id="password-form" class="hidden max-w-xs mx-auto p-6 glass rounded-2xl border border-sky-500/30 animate-fade-in text-center">
                    <p class="text-sm text-sky-400 mb-4 font-bold uppercase">Xác thực Giáo viên</p>
                    <input type="password" id="gv-pass" placeholder="Nhập mã GVS..." class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 mb-4 text-white focus:outline-none focus:border-sky-500">
                    <button onclick="verifyPassword()" class="w-full bg-sky-600 hover:bg-sky-500 text-white font-bold py-2 rounded-lg transition-all">XÁC NHẬN</button>
                </div>

                <div id="teacher-section" class="hidden max-w-md mx-auto p-8 glass rounded-3xl border border-emerald-500/30 text-center shadow-xl animate-fade-in">
                    <p class="text-sm text-emerald-400 mb-2 font-bold uppercase italic">Quyền truy cập: GIÁO VIÊN ✅</p>
                    <p class="text-xs text-slate-500 mb-6">Tải lên file câu hỏi để tạo đề thi mới</p>
                    <input type="file" id="word-upload" accept=".docx" class="hidden" onchange="handleWordUpload(event)">
                    <label for="word-upload" class="bg-emerald-600 hover:bg-emerald-500 text-white px-8 py-3 rounded-xl font-bold uppercase text-xs tracking-widest cursor-pointer inline-block transition-all shadow-lg shadow-emerald-950/50">
                        CHỌN FILE .DOCX
                    </label>
                    <div id="upload-status" class="text-xs text-emerald-400 mt-4 font-mono hidden bg-emerald-950/30 py-2 px-4 rounded-lg"></div>
                </div>

                <div id="student-section" class="hidden max-w-2xl mx-auto p-8 glass rounded-3xl border border-sky-500/20 text-center animate-fade-in">
                    <p class="text-sm text-slate-300 mb-6 font-semibold uppercase tracking-widest">Danh sách bài ôn luyện</p>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <button onclick="selectGrade(10)" class="btn-tech glass py-4 rounded-xl font-bold">ÔN TẬP KHỐI 10</button>
                        <button onclick="selectGrade(11)" class="btn-tech glass py-4 rounded-xl font-bold">ÔN TẬP KHỐI 11</button>
                    </div>
                </div>
            </div>

            <div id="screen-2" class="hidden text-center py-12">
                <h2 id="screen-2-title" class="text-3xl font-bold mb-10 text-sky-400 uppercase">CHỌN HÌNH THỨC</h2>
                <div id="type-options" class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-2xl mx-auto"></div>
                <button onclick="goScreen(1)" class="mt-8 text-slate-500 hover:text-white transition-colors">← Quay lại</button>
            </div>

            <div id="screen-3" class="hidden">
                <div id="quiz-container" class="space-y-8 mb-32"></div>
                <div class="fixed bottom-0 left-0 w-full glass p-4 flex justify-center border-t border-sky-500/30 z-50">
                    <button onclick="confirmSubmit()" class="bg-sky-600 hover:bg-sky-500 text-white px-12 py-3 rounded-xl font-bold uppercase tracking-widest">Nộp Bài</button>
                </div>
            </div>

            <div id="screen-4" class="hidden text-center py-12">
                <h2 class="font-tech text-4xl text-sky-400 mb-6 tracking-tighter">KẾT QUẢ</h2>
                <div class="glass p-10 rounded-3xl inline-block mb-8 min-w-[240px]">
                    <p id="score-text" class="text-7xl font-bold text-white">0.00</p>
                    <p id="max-score-label" class="text-slate-400 mt-2 font-semibold tracking-widest uppercase text-xs">Điểm số</p>
                </div>
                <div class="flex flex-col items-center gap-4">
                    <button onclick="showReview()" class="bg-emerald-600 hover:bg-emerald-500 px-10 py-3 rounded-full font-bold w-64">XEM LẠI ĐÁP ÁN</button>
                    <button onclick="location.reload()" class="btn-tech glass px-10 py-3 rounded-full font-bold w-64">QUAY LẠI TRANG CHỦ</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DỮ LIỆU CÂU HỎI MẶC ĐỊNH
        const commonMultiple = [
            { question: "Mặt phẳng nằm ngang gọi là gì?", options: ["Mặt phẳng chiếu đứng", "Mặt phẳng chiếu bằng", "Mặt phẳng chiếu cạnh", "Mặt phẳng chiếu nghiêng"], answer: 1 },
            { question: "Tỉ lệ 1:2 là loại tỉ lệ nào?", options: ["Tỉ lệ phóng to", "Tỉ lệ thu nhỏ", "Tỉ lệ nguyên hình", "Tỉ lệ bất kì"], answer: 1 }
        ];
        const commonTF = [
            { q: "Nguyên tắc bền vững trong thiết kế:", sub: [{ t: "Sử dụng tài nguyên tối đa để phát triển nhanh.", a: "S" }, { t: "Quy tắc 6R là cốt lõi bảo vệ môi trường.", a: "Đ" }] }
        ];

        let questionsDB = { 10: { multiple: commonMultiple, tf: commonTF }, 11: { multiple: commonMultiple, tf: commonTF } };
        let state = { grade: 0, type: '', list: [], userAns: {}, isReview: false, timer: null, timeLeft: 1500 };

        // LOGIC PHÂN QUYỀN VÀ MẬT KHẨU
        function checkRole(role) {
            const passForm = document.getElementById('password-form');
            const teacherSec = document.getElementById('teacher-section');
            const studentSec = document.getElementById('student-section');

            if (role === 'teacher') {
                studentSec.classList.add('hidden');
                passForm.classList.remove('hidden'); // Hiện form nhập mã
                teacherSec.classList.add('hidden');
            } else {
                passForm.classList.add('hidden');
                teacherSec.classList.add('hidden');
                studentSec.classList.remove('hidden'); // Học sinh vào luôn
                studentSec.scrollIntoView({ behavior: 'smooth' });
            }
        }

        function verifyPassword() {
            const pass = document.getElementById('gv-pass').value;
            if (pass === 'GVS2026') {
                document.getElementById('password-form').classList.add('hidden');
                document.getElementById('teacher-section').classList.remove('hidden');
            } else {
                alert('Sai mã xác thực Giáo viên! Vui lòng kiểm tra lại.');
            }
        }

        // XỬ LÝ FILE WORD
        function handleWordUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const statusDiv = document.getElementById('upload-status');
            statusDiv.innerText = "⏳ Đang xử lý..."; statusDiv.classList.remove('hidden');

            const reader = new FileReader();
            reader.onload = function(e) {
                mammoth.extractRawText({ arrayBuffer: e.target.result }).then(res => {
                    const lines = res.value.split('\n').map(l => l.trim()).filter(l => l.length > 0);
                    let uploadedM = []; let curQ = null;
                    lines.forEach(line => {
                        if (line.match(/^Câu\s+\d+[:\.]/i)) {
                            if (curQ && curQ.options.length > 0) uploadedM.push(curQ);
                            curQ = { question: line.replace(/^Câu\s+\d+[:\.]/i, "").trim(), options: [], answer: 0 };
                        } else if (curQ && line.match(/^[A-D][:\.\)]/i)) {
                            let optTxt = line.replace(/^[A-D][:\.\)]/i, "").trim();
                            if (optTxt.endsWith('*')) { optTxt = optTxt.slice(0,-1).trim(); curQ.answer = curQ.options.length; }
                            curQ.options.push(optTxt);
                        }
                    });
                    if (curQ && curQ.options.length > 0) uploadedM.push(curQ);
                    if (uploadedM.length > 0) {
                        questionsDB['WORD'] = { multiple: uploadedM, tf: [] };
                        statusDiv.innerText = `✅ Đã nạp thành công ${uploadedM.length} câu!`;
                        setTimeout(() => selectGrade('WORD'), 1000);
                    }
                });
            };
            reader.readAsArrayBuffer(file);
        }

        // NAVIGATION & ENGINE
        function selectGrade(g) {
            state.grade = g;
            document.getElementById('grade-display').innerText = g === 'WORD' ? 'ĐỀ WORD VỪA NẠP' : `CÔNG NGHỆ ${g}`;
            const opt = document.getElementById('type-options');
            opt.innerHTML = g === 'WORD' ? 
                `<button onclick="prepareQuiz('multiple')" class="btn-tech glass p-8 rounded-2xl text-xl font-bold">LÀM BÀI VỪA NẠP</button>` :
                `<button onclick="prepareQuiz('multiple')" class="btn-tech glass p-8 rounded-2xl text-xl font-bold">Trắc nghiệm 1 đáp án</button>
                 <button onclick="prepareQuiz('tf')" class="btn-tech glass p-8 rounded-2xl text-xl font-bold">Trắc nghiệm Đúng/Sai</button>`;
            goScreen(2);
        }

        function goScreen(id) {
            document.querySelectorAll('[id^="screen-"]').forEach(s => s.classList.add('hidden'));
            document.getElementById(`screen-${id}`).classList.remove('hidden');
        }

        function prepareQuiz(type) {
            state.type = type; state.isReview = false; state.userAns = {};
            state.list = questionsDB[state.grade][type];
            goScreen(3); render(); startTimer();
        }

        function render() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';
            state.list.forEach((q, idx) => {
                const div = document.createElement('div');
                div.className = "glass p-6 rounded-2xl border-l-4 border-transparent hover:border-sky-500 transition-all";
                if (state.type === 'tf') {
                    div.innerHTML = `<p class="font-bold mb-4 text-lg"><span class="text-sky-400 mr-2">Câu ${idx+1}:</span>${q.q}</p>`;
                    q.sub.forEach((s, si) => {
                        const userChoice = state.userAns[`${idx}_${si}`];
                        let bD = "border-white/10", bS = "border-white/10";
                        if (state.isReview) {
                            bD = s.a === "Đ" ? "correct-tf" : (userChoice === "Đ" ? "wrong-tf" : "opacity-30");
                            bS = s.a === "S" ? "correct-tf" : (userChoice === "S" ? "wrong-tf" : "opacity-30");
                        } else if(userChoice === "Đ") bD = "active-tf"; else if(userChoice === "S") bS = "active-tf";
                        div.innerHTML += `<div class="flex justify-between items-center p-4 border-b border-white/5 last:border-0">
                            <span class="text-sm">${s.t}</span>
                            <div class="flex gap-2">
                                <button onclick="pickTF('${idx}_${si}', 'Đ')" class="w-16 py-1 rounded border text-xs ${bD}" ${state.isReview?'disabled':''}>ĐÚNG</button>
                                <button onclick="pickTF('${idx}_${si}', 'S')" class="w-16 py-1 rounded border text-xs ${bS}" ${state.isReview?'disabled':''}>SAI</button>
                            </div>
                        </div>`;
                    });
                } else {
                    div.innerHTML = `<p class="font-bold mb-4 text-lg"><span class="text-sky-400 mr-2">Câu ${idx+1}:</span>${q.question}</p>
                        <div class="grid gap-3">${q.options.map((opt, i) => {
                            let cls = "border-white/10";
                            if(state.isReview) {
                                if(i === q.answer) cls = "bg-emerald-600 border-emerald-500";
                                else if(state.userAns[idx] === i) cls = "bg-red-600 border-red-500";
                            } else if(state.userAns[idx] === i) cls = "selected-mc border-sky-500";
                            return `<button onclick="pickMC(${idx}, ${i})" class="p-4 border rounded-xl text-left text-sm ${cls}" ${state.isReview?'disabled':''}>${opt}</button>`;
                        }).join('')}</div>`;
                }
                container.appendChild(div);
            });
        }

        function pickMC(qI, oI) { state.userAns[qI] = oI; render(); }
        function pickTF(id, val) { state.userAns[id] = val; render(); }
        function confirmSubmit() { if(confirm("Bạn muốn nộp bài?")) submit(); }

        function submit() {
            clearInterval(state.timer);
            let score = 0;
            state.list.forEach((q, idx) => {
                if(state.type === 'tf') {
                    let c = 0; q.sub.forEach((s, si) => { if(state.userAns[`${idx}_${si}`] === s.a) c++; });
                    score += [0, 0.1, 0.25, 0.5, 1.0][c] || 0;
                } else {
                    if(state.userAns[idx] === q.answer) score += 0.25;
                }
            });
            document.getElementById('score-text').innerText = score.toFixed(2);
            goScreen(4);
        }

        function startTimer() {
            clearInterval(state.timer); state.timeLeft = 1500;
            document.getElementById('timer-container').classList.remove('hidden');
            state.timer = setInterval(() => {
                state.timeLeft--;
                const m = Math.floor(state.timeLeft/60); const s = state.timeLeft%60;
                document.getElementById('timer-display').innerText = `${m}:${s<10?'0':''}${s}`;
                if(state.timeLeft<=0) submit();
            }, 1000);
        }
        function showReview() { state.isReview = true; goScreen(3); render(); }
    </script>
</body>
</html>
