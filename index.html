<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECH_EXAM v1.7 - Full Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0ea5e9; --bg: #0f172a; }
        body { background: var(--bg); color: #f1f5f9; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .font-tech { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-tech { transition: all 0.3s; border: 1px solid rgba(14, 165, 233, 0.3); cursor: pointer; }
        .btn-tech:hover:not(:disabled) { background: var(--primary); color: white; box-shadow: 0 0 20px var(--primary); }
        .hidden { display: none; }
        .active-tf { background: #0ea5e9 !important; color: white !important; border-color: #38bdf8 !important; }
        .correct-tf { background: #059669 !important; color: white !important; }
        .wrong-tf { background: #dc2626 !important; color: white !important; }
        .selected-mc { background: rgba(14, 165, 233, 0.3); border-color: #0ea5e9; color: white; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto flex justify-between items-center mb-8">
        <div>
            <h1 class="font-tech text-2xl text-sky-400">TECH_EXAM v1.7</h1>
            <p id="grade-display" class="text-xs text-slate-500 uppercase tracking-widest">Đầy đủ 45 câu hỏi Khối 10</p>
        </div>
        <div id="timer-box" class="glass px-6 py-2 rounded-full border-sky-500/50 hidden">
            <span id="timer" class="font-tech text-xl text-sky-400">15:00</span>
        </div>
    </div>

    <div class="max-w-4xl mx-auto">
        <!-- SCREEN 1: GRADE -->
        <div id="screen-1" class="text-center py-12">
            <h2 class="text-3xl font-bold mb-10">Chọn Khối Lớp</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-md mx-auto">
                <button onclick="selectGrade(10)" class="btn-tech glass p-8 rounded-2xl text-xl font-bold">KHỐI 10</button>
                <button onclick="selectGrade(11)" class="btn-tech glass p-8 rounded-2xl text-xl font-bold">KHỐI 11</button>
            </div>
        </div>

        <!-- SCREEN 2: TYPE -->
        <div id="screen-2" class="hidden text-center py-12">
            <h2 id="screen-2-title" class="text-3xl font-bold mb-10 text-sky-400">CHỌN HÌNH THỨC ÔN TẬP</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-2xl mx-auto">
                <button onclick="prepareQuiz('multiple')" class="btn-tech glass p-8 rounded-2xl">
                    <p class="text-xl font-bold">Trắc nghiệm</p>
                    <p class="text-sm text-slate-400 mt-2">1 đáp án (30 câu)</p>
                </button>
                <button id="tf-btn" onclick="prepareQuiz('tf')" class="btn-tech glass p-8 rounded-2xl">
                    <p class="text-xl font-bold">Đúng / Sai</p>
                    <p class="text-sm text-slate-400 mt-2">Nhiều ý (15 câu)</p>
                </button>
            </div>
            <button onclick="goScreen(1)" class="mt-8 text-slate-500 hover:text-white">← Quay lại chọn khối</button>
        </div>

        <!-- SCREEN 3: QUIZ -->
        <div id="screen-3" class="hidden">
            <div id="quiz-container" class="space-y-8 mb-32"></div>
            <div class="fixed bottom-0 left-0 w-full glass p-4 flex justify-center border-t border-sky-500/30 z-50">
                <button id="submit-btn" onclick="confirmSubmit()" class="bg-sky-600 hover:bg-sky-500 text-white px-12 py-3 rounded-xl font-bold uppercase tracking-widest transition-all">Nộp Bài</button>
            </div>
        </div>

        <!-- SCREEN 4: RESULT -->
        <div id="screen-4" class="hidden text-center py-12">
            <h2 class="font-tech text-4xl text-sky-400 mb-6">HOÀN THÀNH</h2>
            <div class="glass p-10 rounded-3xl inline-block mb-8">
                <p id="score-text" class="text-6xl font-bold">0/0</p>
                <p class="text-slate-400 mt-2">Điểm số của bạn</p>
            </div>
            <div class="flex flex-col items-center gap-4">
                <button onclick="showReview()" class="bg-emerald-600 hover:bg-emerald-500 px-10 py-3 rounded-full font-bold w-64">XEM LẠI ĐÁP ÁN</button>
                <button onclick="location.reload()" class="btn-tech glass px-10 py-3 rounded-full font-bold w-64">LÀM ĐỀ KHÁC</button>
            </div>
        </div>
    </div>

    <script>
        const questionsDB = {

                        { t: "Thiết kế kĩ thuật chỉ dựa trên cảm hứng, không cần toán học.", a: "S" },
                        { t: "Công nghệ sau thường có ưu điểm vượt trội hơn công nghệ cũ cùng loại.", a: "Đ" },
                        { t: "Quy trình thiết kế kết thúc ngay sau khi có giải pháp trên giấy.", a: "S" }
                    ]},
                    { q: "Câu 13. Nhận định về quy trình thiết kế:", sub: [
                        { t: "Quy trình thiết kế kĩ thuật luôn xong ngay lần đầu thử nghiệm.", a: "S" },
                        { t: "Nguyên mẫu là phiên bản thử nghiệm để đánh giá giải pháp.", a: "Đ" },
                        { t: "Xác định vấn đề là bước làm rõ nhu cầu hoặc khó khăn.", a: "Đ" },
                        { t: "Hồ sơ kĩ thuật được lập ở bước cuối cùng.", a: "Đ" }
                    ]},
                    { q: "Câu 14. Quy ước vẽ ren và bản vẽ:", sub: [
                        { t: "Đường chân ren vẽ bằng nét liền mảnh.", a: "Đ" },
                        { t: "Bản vẽ chi tiết có bảng kê.", a: "S" },
                        { t: "M10x1: M là ren hệ mét, 10 là đường kính, 1 là bước ren.", a: "Đ" },
                        { t: "Hình cắt giúp thấy cấu tạo bên trong chi tiết.", a: "Đ" }
                    ]},
                    { q: "Câu 15. Thiết kế và phần mềm hỗ trợ:", sub: [
                        { t: "CAD giúp chỉnh sửa bản vẽ nhanh và chính xác hơn vẽ tay.", a: "Đ" },
                        { t: "Yếu tố nhân trắc là nghiên cứu về tài chính dự án.", a: "S" },
                        { t: "Nếu kiểm chứng thất bại, cần quay lại các bước trước để sửa đổi.", a: "Đ" },
                        { t: "Thiết kế kỹ thuật hiện đại rất coi trọng tính bền vững môi trường.", a: "Đ" }
                    ]}
                ]
            },
            11: { multiple: [], tf: [] }
        };

        let state = { grade: 0, type: '', list: [], userAns: {}, isReview: false };

        function selectGrade(g) {
            state.grade = g;
            document.getElementById('grade-display').innerText = `CÔNG NGHỆ ${g}`;
            goScreen(2);
        }

        function prepareQuiz(type) {
            state.type = type;
            state.isReview = false;
            state.userAns = {};
            
            let data = JSON.parse(JSON.stringify(questionsDB[state.grade][type]));
            
            if(type === 'multiple') {
                data.forEach(q => {
                    let correctTxt = q.options[q.answer];
                    q.options.sort(() => Math.random() - 0.5);
                    q.answer = q.options.indexOf(correctTxt);
                });
            }

            state.list = data.sort(() => Math.random() - 0.5);
            goScreen(3);
            render();
        }

        function render() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';
            
            state.list.forEach((q, idx) => {
                const div = document.createElement('div');
                div.className = "glass p-6 rounded-2xl";
                
                if (state.type === 'tf') {
                    div.innerHTML = `<p class="text-sky-400 font-bold mb-4">Câu ${idx+1}: ${q.q}</p>`;
                    q.sub.forEach((s, sIdx) => {
                        const subId = `${idx}_${sIdx}`;
                        const userChoice = state.userAns[subId];
                        let btnD = "border-white/10", btnS = "border-white/10";

                        if (state.isReview) {
                            btnD = s.a === "Đ" ? "correct-tf" : (userChoice === "Đ" ? "wrong-tf" : "opacity-30");
                            btnS = s.a === "S" ? "correct-tf" : (userChoice === "S" ? "wrong-tf" : "opacity-30");
                        } else if(userChoice === "Đ") btnD = "active-tf";
                        else if(userChoice === "S") btnS = "active-tf";

                        div.innerHTML += `
                            <div class="flex flex-col md:flex-row md:items-center justify-between p-3 border-b border-white/5 last:border-0 gap-3">
                                <span class="flex-1 text-sm">${String.fromCharCode(65+sIdx)}. ${s.t}</span>
                                <div class="flex gap-2">
                                    <button onclick="pickTF('${subId}', 'Đ')" class="px-4 py-1 rounded border text-xs ${btnD}" ${state.isReview?'disabled':''}>ĐÚNG</button>
                                    <button onclick="pickTF('${subId}', 'S')" class="px-4 py-1 rounded border text-xs ${btnS}" ${state.isReview?'disabled':''}>SAI</button>
                                </div>
                            </div>`;
                    });
                } else {
                    div.innerHTML = `<p class="text-sky-400 font-bold mb-4">Câu ${idx+1}: ${q.question}</p>
                        <div class="grid grid-cols-1 gap-3">
                            ${q.options.map((opt, i) => {
                                let cls = "border-white/10";
                                if(state.isReview) {
                                    if(i === q.answer) cls = "opt-correct bg-emerald-600 border-emerald-500";
                                    else if(state.userAns[idx] === i) cls = "opt-wrong bg-red-600 border-red-500";
                                } else if(state.userAns[idx] === i) cls = "selected-mc";
                                return `<button onclick="pickMC(${idx}, ${i})" class="p-4 border rounded-xl text-left text-sm transition-all ${cls}" ${state.isReview?'disabled':''}>
                                    <span class="font-bold mr-2">${String.fromCharCode(65+i)}.</span> ${opt}
                                </button>`;
                            }).join('')}
                        </div>`;
                }
                container.appendChild(div);
            });
        }

        function pickMC(qIdx, oIdx) { state.userAns[qIdx] = oIdx; render(); }
        function pickTF(id, val) { state.userAns[id] = val; render(); }

        function confirmSubmit() { if(confirm("Nộp bài?")) submit(); }

        function submit() {
            let correct = 0, total = 0;
            if(state.type === 'tf') {
                state.list.forEach((q, idx) => q.sub.forEach((s, si) => { total++; if(state.userAns[`${idx}_${si}`] === s.a) correct++; }));
            } else {
                total = state.list.length;
                state.list.forEach((q, idx) => { if(state.userAns[idx] === q.answer) correct++; });
            }
            document.getElementById('score-text').innerText = `${correct}/${total}`;
            goScreen(4);
            window.scrollTo(0,0);
        }

        function showReview() {
            state.isReview = true;
            goScreen(3);
            document.getElementById('submit-btn').innerText = "Về màn hình điểm";
            document.getElementById('submit-btn').onclick = () => goScreen(4);
            render();
            window.scrollTo(0,0);
        }

        function goScreen(id) {
            document.querySelectorAll('[id^="screen-"]').forEach(s => s.classList.add('hidden'));
            document.getElementById(`screen-${id}`).classList.remove('hidden');
        }
    </script>
</body>
</html>
