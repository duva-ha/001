<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">

    <title>TECH_EXAM v1.8 - Update Grade 11</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0ea5e9; --bg: #0f172a; }
        body { background: var(--bg); color: #f1f5f9; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .font-tech { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-tech { transition: all 0.3s; border: 1px solid rgba(14, 165, 233, 0.3); cursor: pointer; }
        .btn-tech:hover:not(:disabled) { background: var(--primary); color: white; box-shadow: 0 0 20px var(--primary); }
        .hidden { display: none; }
        .active-tf { background: #0ea5e9 !important; color: white !important; border-color: #38bdf8 !important; }
        .correct-tf { background: #059669 !important; color: white !important; }
        .wrong-tf { background: #dc2626 !important; color: white !important; }
        .selected-mc { background: rgba(14, 165, 233, 0.3); border-color: #0ea5e9; color: white; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto flex justify-between items-center mb-8">
        <div>
            <h1 class="font-tech text-2xl text-sky-400">TECH_EXAM v1.8</h1>
            <p id="grade-display" class="text-xs text-slate-500 uppercase tracking-widest">Hệ thống ôn tập Công nghệ</p>
        </div>
    </div>

    <div class="max-w-4xl mx-auto">
        <!-- SCREEN 1: GRADE -->
        <div id="screen-1" class="text-center py-12">
            <h2 class="text-3xl font-bold mb-10">Chọn Khối Lớp</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-md mx-auto">
                <button onclick="selectGrade(10)" class="btn-tech glass p-8 rounded-2xl text-xl font-bold">KHỐI 10</button>
                <button onclick="selectGrade(11)" class="btn-tech glass p-8 rounded-2xl text-xl font-bold">KHỐI 11</button>
            </div>
        </div>

        <!-- SCREEN 2: TYPE -->
        <div id="screen-2" class="hidden text-center py-12">
            <h2 id="screen-2-title" class="text-3xl font-bold mb-10 text-sky-400">CHỌN HÌNH THỨC</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-2xl mx-auto">
                <button onclick="prepareQuiz('multiple')" class="btn-tech glass p-8 rounded-2xl text-xl font-bold">Trắc nghiệm 1 đáp án</button>
                <button onclick="prepareQuiz('tf')" class="btn-tech glass p-8 rounded-2xl text-xl font-bold">Trắc nghiệm Đúng/Sai</button>
            </div>
            <button onclick="goScreen(1)" class="mt-8 text-slate-500 hover:text-white">← Quay lại chọn khối</button>
        </div>

        <!-- SCREEN 3: QUIZ -->
        <div id="screen-3" class="hidden">
            <div id="quiz-container" class="space-y-8 mb-32"></div>
            <div class="fixed bottom-0 left-0 w-full glass p-4 flex justify-center border-t border-sky-500/30 z-50">
                <button id="submit-btn" onclick="confirmSubmit()" class="bg-sky-600 hover:bg-sky-500 text-white px-12 py-3 rounded-xl font-bold uppercase tracking-widest transition-all">Nộp Bài</button>
            </div>
        </div>

        <!-- SCREEN 4: RESULT -->
        <div id="screen-4" class="hidden text-center py-12">
            <h2 class="font-tech text-4xl text-sky-400 mb-6">KẾT QUẢ</h2>
            <div class="glass p-10 rounded-3xl inline-block mb-8">
                <p id="score-text" class="text-6xl font-bold">0/0</p>
                <p class="text-slate-400 mt-2">Câu đúng</p>
            </div>
            <div class="flex flex-col items-center gap-4">
                <button onclick="showReview()" class="bg-emerald-600 hover:bg-emerald-500 px-10 py-3 rounded-full font-bold w-64">XEM LẠI ĐÁP ÁN</button>
                <button onclick="location.reload()" class="btn-tech glass px-10 py-3 rounded-full font-bold w-64">LÀM ĐỀ KHÁC</button>
            </div>
        </div>
    </div>

                    ]},
                    { q: "Câu 3. Đánh giá về cơ cấu trục khuỷu thanh truyền:", sub: [
                        { t: "Piston có nhiệm vụ nhận lực giãn nở của khí cháy rồi truyền lực cho trục khuỷu để sinh công.", a: "Đ" },
                        { t: "Thanh truyền là chi tiết trung gian nối giữa piston và trục khuỷu.", a: "Đ" },
                        { t: "Trục khuỷu nhận lực từ thanh truyền để tạo ra mô men quay kéo máy công tác.", a: "Đ" },
                        { t: "Chốt piston dùng để nối đầu to thanh truyền với piston.", a: "S" }
                    ]},
                    { q: "Câu 4. Về cơ cấu phối khí:", sub: [
                        { t: "Cơ cấu phối khí có nhiệm vụ đóng, mở các cửa nạp, cửa thải đúng lúc.", a: "Đ" },
                        { t: "Ở cơ cấu phối khí dùng xupap treo, xupap được lắp ở thân máy.", a: "S" },
                        { t: "Trục cam nhận chuyển động quay từ trục khuỷu thông qua đai hoặc xích cam.", a: "Đ" },
                        { t: "Số vòng quay của trục cam bằng một nửa số vòng quay của trục khuỷu ở động cơ 4 kỳ.", a: "Đ" }
                    ]},
                    { q: "Câu 5. Nhận định về hệ thống bôi trơn:", sub: [
                        { t: "Hệ thống bôi trơn giúp giảm ma sát và mài mòn giữa các bề mặt chi tiết chuyển động.", a: "Đ" },
                        { t: "Trong hệ thống bôi trơn cưỡng bức, dầu được đẩy đến các bề mặt ma sát nhờ áp suất của bơm dầu.", a: "Đ" },
                        { t: "Dầu bôi trơn chỉ có tác dụng làm trơn mà không có tác dụng làm mát hay tẩy rửa chi tiết.", a: "S" },
                        { t: "Bầu lọc dầu có nhiệm vụ giữ lại các tạp chất cơ học lẫn trong dầu bôi trơn.", a: "Đ" }
                    ]},
                    { q: "Câu 6. Đánh giá về hệ thống làm mát:", sub: [
                        { t: "Hệ thống làm mát bằng nước loại tuần hoàn cưỡng bức sử dụng bơm nước để tạo sự lưu thông.", a: "Đ" },
                        { t: "Van hằng nhiệt giúp điều chỉnh nhiệt độ nước làm mát bằng cách khống chế lượng nước đi qua két nước.", a: "Đ" },
                        { t: "Khi nhiệt độ nước còn thấp, van hằng nhiệt sẽ mở cho nước chảy hoàn toàn về két nước để làm nguội.", a: "S" },
                        { t: "Quạt gió trong hệ thống làm mát có tác dụng tăng tốc độ lưu thông của không khí qua két nước.", a: "Đ" }
                    ]},
                    { q: "Câu 7. Về hệ thống cung cấp nhiên liệu và không khí trong động cơ xăng:", sub: [
                        { t: "Hệ thống phun xăng điện tử (EFI) sử dụng các cảm biến để điều khiển lượng xăng phun vào xi lanh tối ưu.", a: "Đ" },
                        { t: "Bộ chế hòa khí có nhiệm vụ trộn xăng với không khí theo tỉ lệ nhất định trước khi đưa vào xi lanh.", a: "Đ" },
                        { t: "Ở hệ thống phun xăng, xăng được phun trực tiếp vào đường ống nạp hoặc vào buồng cháy.", a: "Đ" },
                        { t: "Bầu lọc khí có tác dụng loại bỏ bụi bẩn trong không khí trước khi đưa vào xi lanh.", a: "Đ" }
                    ]},
                    { q: "Câu 8. Về hệ thống cung cấp nhiên liệu trong động cơ Diesel:", sub: [
                        { t: "Nhiên liệu Diesel được phun vào xi lanh ở cuối kỳ nạp dưới áp suất cao.", a: "S" },
                        { t: "Bơm cao áp có nhiệm vụ cung cấp nhiên liệu với áp suất cao, đúng thời điểm cho vòi phun.", a: "Đ" },
                        { t: "Vòi phun có nhiệm vụ phun tơi nhiên liệu vào buồng cháy để quá trình cháy tốt nhất.", a: "Đ" },
                        { t: "Động cơ Diesel tự bốc cháy nhờ nén khí ở áp suất cao mà không cần bugi.", a: "Đ" }
                    ]},
                    { q: "Câu 9. Đánh giá về hệ thống đánh lửa:", sub: [
                        { t: "Hệ thống đánh lửa chỉ có trên động cơ xăng, không có trên động cơ Diesel.", a: "Đ" },
                        { t: "Nhiệm vụ của hệ thống đánh lửa là tạo ra tia lửa điện cao áp để châm cháy hòa khí đúng lúc.", a: "Đ" },
                        { t: "Bugi là chi tiết trực tiếp tạo ra tia lửa điện bên trong buồng cháy.", a: "Đ" },
                        { t: "Cuộn sơ cấp của biến áp đánh lửa có số vòng dây nhiều hơn cuộn thứ cấp.", a: "S" }
                    ]},
                    { q: "Câu 10. Về hệ thống truyền lực trên ô tô:", sub: [
                        { t: "Hệ thống truyền lực truyền mô men quay từ động cơ đến các bánh xe chủ động.", a: "Đ" },
                        { t: "Ly hợp dùng để nối hoặc ngắt truyền động từ động cơ đến hộp số một cách đột ngột.", a: "S" },
                        { t: "Hộp số giúp thay đổi mô men quay, tốc độ và cho phép xe chạy lùi.", a: "Đ" },
                        { t: "Truyền lực chính và bộ vi sai giúp các bánh xe chủ động quay với tốc độ khác nhau khi vào cua.", a: "Đ" }
                    ]},
                    { q: "Câu 11. Nhận định về ứng dụng của động cơ đốt trong:", sub: [
                        { t: "Động cơ đốt trong là nguồn động lực phổ biến nhất cho ô tô, tàu thủy, máy bay.", a: "Đ" },
                        { t: "Khi lắp cho máy nông nghiệp, cần có hệ thống truyền lực phù hợp đặc thù công việc.", a: "Đ" },
                        { t: "Động cơ đốt trong không được sử dụng trong máy phát điện vì tiếng ồn.", a: "S" },
                        { t: "Hiệu suất của động cơ đốt trong thường cao hơn động cơ điện.", a: "S" }
                    ]},
                    { q: "Câu 12. Về bảo dưỡng và sửa chữa động cơ:", sub: [
                        { t: "Bảo dưỡng định kỳ giúp kéo dài tuổi thọ và đảm bảo an toàn vận hành.", a: "Đ" },
                        { t: "Thay dầu máy và lọc dầu là công việc cần thực hiện định kỳ theo khuyến cáo.", a: "Đ" },
                        { t: "Khi động cơ có tiếng gõ lạ, người dùng vẫn có thể tiếp tục vận hành bình thường.", a: "S" },
                        { t: "Kiểm tra mực nước làm mát là cần thiết để tránh tình trạng động cơ bị quá nhiệt.", a: "Đ" }
                    ]},
                    { q: "Câu 13. Về nguyên lý làm việc của ĐCĐT (Học sinh trao đổi):", sub: [
                        { t: "Động cơ Diesel không cần bugi vì hòa khí tự bốc cháy dưới áp suất và nhiệt độ cao.", a: "Đ" },
                        { t: "Trong kì nén, piston dịch chuyển từ ĐCT xuống ĐCD.", a: "S" },
                        { t: "Một chu trình động cơ 4 kỳ gồm: nạp, nén, cháy giãn nở và xả.", a: "Đ" },
                        { t: "Thể tích buồng cháy Vs = S (Sai công thức).", a: "S" }
                    ]},
                    { q: "Câu 14. Vai trò của các hệ thống trong động cơ:", sub: [
                        { t: "Xe gắn máy thông thường sử dụng hệ thống khởi động bằng khí nén.", a: "S" },
                        { t: "Hệ thống xử lý khí thải giúp giảm chất độc hại trước khi thải ra môi trường.", a: "Đ" },
                        { t: "Hệ thống làm mát chia làm hai loại: bằng không khí và bằng chất lỏng.", a: "Đ" },
                        { t: "Hệ thống đánh lửa có nhiệm vụ tạo tia lửa điện trong động cơ Diesel.", a: "S" }
                    ]},
                    { q: "Câu 15. Cấu tạo của ô tô:", sub: [
                        { t: "Ô tô gồm: động cơ, truyền lực, bánh xe, treo, lái, phanh, khung vỏ, điện.", a: "Đ" },
                        { t: "Hệ thống truyền lực của ô tô chỉ bao gồm động cơ và hộp số.", a: "S" },
                        { t: "Khung gầm ô tô không ảnh hưởng đến sự ổn định khi di chuyển.", a: "S" },
                        { t: "Hệ thống lái gồm: cơ cấu lái, dẫn động lái và trợ lực lái.", a: "Đ" }
                    ]}
                ]
            }
        };

        let state = { grade: 0, type: '', list: [], userAns: {}, isReview: false };

        function selectGrade(g) {
            state.grade = g;
            document.getElementById('grade-display').innerText = `CÔNG NGHỆ ${g}`;
            goScreen(2);
        }

        function prepareQuiz(type) {
            state.type = type;
            state.isReview = false;
            state.userAns = {};
            
            let data = JSON.parse(JSON.stringify(questionsDB[state.grade][type]));
            if (data.length === 0) {
                alert("Hiện tại chưa có câu hỏi cho phần này!");
                return;
            }

            if(type === 'multiple') {
                data.forEach(q => {
                    let correctTxt = q.options[q.answer];
                    q.options.sort(() => Math.random() - 0.5);
                    q.answer = q.options.indexOf(correctTxt);
                });
            }

            state.list = data.sort(() => Math.random() - 0.5);
            goScreen(3);
            render();
        }

        function render() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';
            
            state.list.forEach((q, idx) => {
                const div = document.createElement('div');
                div.className = "glass p-6 rounded-2xl";
                
                if (state.type === 'tf') {
                    div.innerHTML = `<p class="text-sky-400 font-bold mb-4">Câu ${idx+1}: ${q.q}</p>`;
                    q.sub.forEach((s, sIdx) => {
                        const subId = `${idx}_${sIdx}`;
                        const userChoice = state.userAns[subId];
                        let btnD = "border-white/10", btnS = "border-white/10";

                        if (state.isReview) {
                            btnD = s.a === "Đ" ? "correct-tf" : (userChoice === "Đ" ? "wrong-tf" : "opacity-30");
                            btnS = s.a === "S" ? "correct-tf" : (userChoice === "S" ? "wrong-tf" : "opacity-30");
                        } else if(userChoice === "Đ") btnD = "active-tf";
                        else if(userChoice === "S") btnS = "active-tf";

                        div.innerHTML += `
                            <div class="flex flex-col md:flex-row md:items-center justify-between p-3 border-b border-white/5 last:border-0 gap-3">
                                <span class="flex-1 text-sm">${String.fromCharCode(97+sIdx)}) ${s.t}</span>
                                <div class="flex gap-2">
                                    <button onclick="pickTF('${subId}', 'Đ')" class="px-4 py-1 rounded border text-xs ${btnD}" ${state.isReview?'disabled':''}>ĐÚNG</button>
                                    <button onclick="pickTF('${subId}', 'S')" class="px-4 py-1 rounded border text-xs ${btnS}" ${state.isReview?'disabled':''}>SAI</button>
                                </div>
                            </div>`;
                    });
                } else {
                    div.innerHTML = `<p class="text-sky-400 font-bold mb-4">Câu ${idx+1}: ${q.question}</p>
                        <div class="grid grid-cols-1 gap-3">
                            ${q.options.map((opt, i) => {
                                let cls = "border-white/10";
                                if(state.isReview) {
                                    if(i === q.answer) cls = "bg-emerald-600 border-emerald-500 text-white";
                                    else if(state.userAns[idx] === i) cls = "bg-red-600 border-red-500 text-white";
                                } else if(state.userAns[idx] === i) cls = "selected-mc";
                                return `<button onclick="pickMC(${idx}, ${i})" class="p-4 border rounded-xl text-left text-sm transition-all ${cls}" ${state.isReview?'disabled':''}>
                                    <span class="font-bold mr-2">${String.fromCharCode(65+i)}.</span> ${opt}
                                </button>`;
                            }).join('')}
                        </div>`;
                }
                container.appendChild(div);
            });
        }

        function pickMC(qIdx, oIdx) { state.userAns[qIdx] = oIdx; render(); }
        function pickTF(id, val) { state.userAns[id] = val; render(); }

        function confirmSubmit() { if(confirm("Nộp bài?")) submit(); }

        function submit() {
            let correct = 0, total = 0;
            if(state.type === 'tf') {
                state.list.forEach((q, idx) => q.sub.forEach((s, si) => { total++; if(state.userAns[`${idx}_${si}`] === s.a) correct++; }));
            } else {
                total = state.list.length;
                state.list.forEach((q, idx) => { if(state.userAns[idx] === q.answer) correct++; });
            }
            document.getElementById('score-text').innerText = `${correct}/${total}`;
            goScreen(4);
            window.scrollTo(0,0);
        }

        function showReview() {
            state.isReview = true;
            goScreen(3);
            document.getElementById('submit-btn').innerText = "Về kết quả";
            document.getElementById('submit-btn').onclick = () => goScreen(4);
            render();
            window.scrollTo(0,0);
        }

        function goScreen(id) {
            document.querySelectorAll('[id^="screen-"]').forEach(s => s.classList.add('hidden'));
            document.getElementById(`screen-${id}`).classList.remove('hidden');
        }
    </script>
</body>
</html>
